# render.yaml
# Deploy configuration for Render.com
#
# How to use:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Web Service
#   3. Connect your GitHub repo — Render auto-detects this file
#
# ⚠️  Environment variables that MUST be set manually in the Render dashboard:
#   DISCORD_TOKEN   →  your bot token (never commit this)
#
# Optional overrides (defaults below are fine):
#   DATABASE_URL    →  sqlite:///surveys.db  (swap for PostgreSQL in production)
#   LOG_LEVEL       →  INFO

services:
  - type: web
    name: survey-poll-bot
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirement.txt
    startCommand: python bot.py
    plan: free            # free tier works; UptimeRobot pings keep it alive
    envVars:
      - key: DISCORD_TOKEN
        sync: false       # must be set manually in the Render dashboard
      - key: DATABASE_URL
        value: sqlite:///surveys.db
      - key: LOG_LEVEL
        value: INFO
      # NOTE: PORT is injected automatically by Render — do NOT set it here.
      # Setting PORT manually overrides Render's routing and breaks the service.
    healthCheckPath: /health   # Render polls this to decide if the deploy is healthy
    autoDeploy: true           # redeploy automatically on every push to main
